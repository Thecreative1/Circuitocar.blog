<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@1,900&amp;family=Manrope:wght@400;600&amp;display=swap');
    </style>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0B0D"/>
      <stop offset="100%" stop-color="#0D1F3C"/>
    </linearGradient>
    <linearGradient id="yellow-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#FFE600" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Subtle right-side navy panel -->
  <rect x="760" y="0" width="440" height="630" fill="#0D1F3C" opacity="0.55"/>

  <!-- Large italic C watermark (right side) -->
  <text x="1010" y="500" font-family="'Saira Condensed','Arial Narrow',Arial,sans-serif"
        font-size="540" font-weight="900" font-style="italic"
        fill="#163560" text-anchor="middle" opacity="0.7">C</text>

  <!-- Yellow top stripe -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#yellow-fade)"/>

  <!-- Yellow left accent bar -->
  <rect x="60" y="60" width="4" height="420" fill="#FFFF00" opacity="0.9"/>

  <!-- Eyebrow label -->
  <text x="88" y="110"
        font-family="'Saira Condensed','Arial Narrow',Arial,sans-serif"
        font-size="17" font-weight="600" letter-spacing="3.5"
        fill="#FFFF00">BLOG AUTOMÓVEL · FAMALICÃO · VALE DO AVE</text>

  <!-- Main brand name line 1 -->
  <text x="88" y="250"
        font-family="'Saira Condensed','Arial Narrow',Arial,sans-serif"
        font-size="118" font-weight="900" font-style="italic"
        fill="#FAFAF7">CIRCUITO</text>

  <!-- Main brand name line 2 (yellow) -->
  <text x="88" y="365"
        font-family="'Saira Condensed','Arial Narrow',Arial,sans-serif"
        font-size="118" font-weight="900" font-style="italic"
        fill="#FFFF00">CAR BLOG</text>

  <!-- Separator line -->
  <rect x="88" y="395" width="520" height="2" fill="#FAFAF7" opacity="0.15"/>

  <!-- Tagline -->
  <text x="88" y="438"
        font-family="'Manrope',Arial,sans-serif"
        font-size="22" font-weight="400"
        fill="#9CA3AF">Guias práticos para comprar carro usado com mais clareza.</text>

  <!-- Location pill -->
  <rect x="88" y="476" width="252" height="42" rx="21" fill="#FFFF00"/>
  <text x="214" y="503"
        font-family="'Saira Condensed','Arial Narrow',Arial,sans-serif"
        font-size="15" font-weight="700" letter-spacing="2.5"
        fill="#0A0B0D" text-anchor="middle">JOANE · FAMALICÃO</text>

  <!-- URL bottom left -->
  <text x="88" y="600"
        font-family="'Manrope',Arial,sans-serif"
        font-size="16" font-weight="500"
        fill="#4B5563">circuitocar.blog</text>
</svg>
